<div class="auth-page-v2">
  <div class="manga-halftone" style="position:absolute; inset:0"></div>
  
  <div class="glass-card login-box">
    <!-- Icon Header -->
    <div class="login-header">
       <div class="brand-logo mx-auto mb-4" style="width:64px; height:64px; font-size:2rem">
         <i class="pi pi-user-plus text-3xl"></i>
       </div>
       <h1 class="display-font text-3xl mb-2">{{ 'REGISTER.TITLE' | translate }}</h1>
       <p class="text-dim mb-5">{{ 'REGISTER.SUBTITLE' | translate }}</p>
    </div>

    <!-- Feedback -->
    <p-message *ngIf="error" severity="error" [text]="error" styleClass="w-full mb-4"></p-message>

    <!-- Inputs -->
    <div class="flex flex-column gap-3">
      <div class="flex flex-column gap-1" style="text-align: left">
        <label class="manga-font text-xs uppercase letter-spacing-1">{{ 'REGISTER.NAME' | translate }}</label>
        <span class="p-input-icon-left">
          <i class="pi pi-user"></i>
          <input pInputText [(ngModel)]="displayName" type="text" [placeholder]="'REGISTER.NAME' | translate" class="w-full" />
        </span>
      </div>

      <div class="flex flex-column gap-1" style="text-align: left">
        <label class="manga-font text-xs uppercase letter-spacing-1">{{ 'REGISTER.EMAIL' | translate }}</label>
        <span class="p-input-icon-left">
          <i class="pi pi-envelope"></i>
          <input pInputText [(ngModel)]="email" type="email" [placeholder]="'REGISTER.EMAIL' | translate" class="w-full" />
        </span>
      </div>

      <div class="flex flex-column gap-1" style="text-align: left">
        <label class="manga-font text-xs uppercase letter-spacing-1">{{ 'REGISTER.PHONE' | translate }}</label>
        <span class="p-input-icon-left">
          <i class="pi pi-phone"></i>
          <input pInputText [(ngModel)]="phoneNumber" type="tel" [placeholder]="'REGISTER.PHONE' | translate" class="w-full" />
        </span>
      </div>

      <div class="flex flex-column gap-1" style="text-align: left">
        <label class="manga-font text-xs uppercase letter-spacing-1">{{ 'REGISTER.PASSWORD' | translate }}</label>
        <p-password [(ngModel)]="password" [feedback]="false" [toggleMask]="true" styleClass="w-full" [placeholder]="'REGISTER.PASSWORD' | translate"></p-password>
      </div>

      <button pButton class="p-button-primary p-button-lg w-full mt-3" 
              [label]="'REGISTER.SUBMIT' | translate" icon="pi pi-user-plus" (click)="register()"></button>
    </div>

    <!-- Footer -->
    <div class="text-center mt-5 text-sm">
      <span class="text-muted">{{ 'REGISTER.HAVE_ACCOUNT' | translate }}</span>
      <a routerLink="/login" class="text-primary font-bold ml-2 hover:underline">{{ 'REGISTER.LOGIN_LINK' | translate }}</a>
    </div>
  </div>
</div>
