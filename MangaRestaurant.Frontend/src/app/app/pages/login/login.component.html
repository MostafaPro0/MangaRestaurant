<div class="auth-page-v2">
  <div class="manga-halftone" style="position:absolute; inset:0"></div>
  
  <div class="glass-card login-box">
    <!-- Icon Header -->
    <div class="login-header">
       <div class="brand-logo mx-auto mb-4" style="width:64px; height:64px; font-size:2rem">
         <i class="pi pi-user text-3xl"></i>
       </div>
       <h1 class="display-font text-3xl mb-2">{{ 'LOGIN.TITLE' | translate }}</h1>
       <p class="text-dim mb-5">{{ 'LOGIN.SUBTITLE' | translate }}</p>
    </div>

    <!-- Feedback -->
    <p-message *ngIf="error" severity="error" [text]="error" styleClass="w-full mb-4"></p-message>

    <!-- Inputs -->
    <div class="flex flex-column gap-4">
      <div class="flex flex-column gap-2" style="text-align: left">
        <label class="manga-font text-xs uppercase letter-spacing-1">{{ 'LOGIN.EMAIL' | translate }}</label>
        <span class="p-input-icon-left">
          <i class="pi pi-envelope"></i>
          <input pInputText [(ngModel)]="email" type="email" [placeholder]="'LOGIN.EMAIL' | translate" class="w-full" />
        </span>
      </div>

      <div class="flex flex-column gap-2" style="text-align: left">
        <div class="flex justify-content-between align-items-center">
            <label class="manga-font text-xs uppercase letter-spacing-1">{{ 'LOGIN.PASSWORD' | translate }}</label>
            <a routerLink="/account/forgot-password" class="text-xs text-primary font-bold no-underline hover:underline">{{ 'AUTH.FORGOT_PASSWORD' | translate }}</a>
        </div>
        <p-password [(ngModel)]="password" [feedback]="false" [toggleMask]="true" styleClass="w-full" [placeholder]="'LOGIN.PASSWORD' | translate"></p-password>
      </div>

      <button pButton class="p-button-primary p-button-lg w-full mt-2" 
              [label]="'LOGIN.SUBMIT' | translate" 
              [icon]="loading ? 'pi pi-spin pi-spinner' : 'pi pi-sign-in'" 
              [loading]="loading"
              [disabled]="loading"
              (click)="login()"></button>
    </div>

    <!-- Google Login -->
    <div class="flex flex-column align-items-center mt-4">
      <div class="text-xs text-muted mb-3 uppercase letter-spacing-1">{{ 'LOGIN.CONTINUE_WITH' | translate }}</div>
      <div id="google-btn" class="w-full flex justify-content-center"></div>
    </div>

    <!-- Footer -->
    <div class="text-center mt-5 text-sm">
      <span class="text-muted">{{ 'LOGIN.NO_ACCOUNT' | translate }}</span>
      <a routerLink="/register" class="text-primary font-bold ml-2 hover:underline">{{ 'LOGIN.REGISTER_LINK' | translate }}</a>
    </div>
  </div>
</div>
